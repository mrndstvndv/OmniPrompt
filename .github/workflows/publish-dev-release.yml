name: Publish Dev Release

on:
  workflow_dispatch:
  push:
    branches:
      - dev

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  publish-dev-release:
    name: Build and Publish Dev Release
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Get Release Context
        id: release_context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASES_JSON=$(gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=100")
          PREVIOUS_STABLE_TAG=$(echo "$RELEASES_JSON" | jq -r 'map(select(.draft == false and .prerelease == false)) | .[0].tag_name // ""')
          PREVIOUS_STABLE_PUBLISHED_AT=$(echo "$RELEASES_JSON" | jq -r 'map(select(.draft == false and .prerelease == false)) | .[0].published_at // ""')
          DEV_RELEASE_COUNT=$(echo "$RELEASES_JSON" | jq -r --arg published_at "$PREVIOUS_STABLE_PUBLISHED_AT" '
            [
              .[]
              | select(.draft == false and .prerelease == true)
              | select(.tag_name | test("-dev\\.[0-9]+$"))
              | select($published_at == "" or .published_at > $published_at)
            ] | length
          ')
          NEXT_DEV_RELEASE_NUMBER=$((DEV_RELEASE_COUNT + 1))

          echo "previous_stable_tag=$PREVIOUS_STABLE_TAG" >> $GITHUB_OUTPUT
          echo "dev_release_count=$DEV_RELEASE_COUNT" >> $GITHUB_OUTPUT
          echo "next_dev_release_number=$NEXT_DEV_RELEASE_NUMBER" >> $GITHUB_OUTPUT

          echo "Previous stable tag: $PREVIOUS_STABLE_TAG"
          echo "Existing dev releases since stable: $DEV_RELEASE_COUNT"
          echo "Next dev release number: $NEXT_DEV_RELEASE_NUMBER"

      - name: Generate Changelog
        id: changelog
        env:
          RELEASE_CHANNEL: dev
          DEV_RELEASE_NUMBER: ${{ steps.release_context.outputs.next_dev_release_number }}
        run: |
          chmod +x .github/scripts/generate-changelog.sh
          .github/scripts/generate-changelog.sh "${{ steps.release_context.outputs.previous_stable_tag }}" 2>/tmp/script_output > /tmp/changelog_output

          SKIP_RELEASE=$(grep "skip_release=" /tmp/script_output | cut -d= -f2)
          NEW_VERSION=$(grep "^v" /tmp/script_output)
          CHANGELOG=$(cat /tmp/changelog_output)

          echo "skip_release=$SKIP_RELEASE" >> $GITHUB_OUTPUT
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

          echo "Skip release: $SKIP_RELEASE"
          echo "New version: $NEW_VERSION"
          echo "Changelog:"
          echo "$CHANGELOG"

      - name: Update Version in gradle.properties
        if: steps.changelog.outputs.skip_release != 'true'
        run: |
          NEW_VERSION="${{ steps.changelog.outputs.new_version }}"
          VERSION_NAME="${NEW_VERSION#v}"

          CURRENT_VERSION_CODE=$(grep "^appVersionCode=" gradle.properties | cut -d= -f2)
          NEW_VERSION_CODE=$((CURRENT_VERSION_CODE + 1))

          echo "Updating version: name=$VERSION_NAME, code=$NEW_VERSION_CODE"

          awk -v ver="$VERSION_NAME" -v code="$NEW_VERSION_CODE" '
            /^appVersion=/ { $0="appVersion="ver }
            /^appVersionCode=/ { $0="appVersionCode="code }
            { print }
          ' gradle.properties > gradle.properties.tmp && mv gradle.properties.tmp gradle.properties

          grep -q "^appVersion=$VERSION_NAME$" gradle.properties || { echo "ERROR: Failed to update appVersion"; exit 1; }
          grep -q "^appVersionCode=$NEW_VERSION_CODE$" gradle.properties || { echo "ERROR: Failed to update appVersionCode"; exit 1; }

      - name: Decode Keystore
        if: steps.changelog.outputs.skip_release != 'true'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > release.keystore

      - name: Install Determinate Nix
        if: steps.changelog.outputs.skip_release != 'true'
        uses: DeterminateSystems/determinate-nix-action@v3

      - name: Build Signed Release APK
        if: steps.changelog.outputs.skip_release != 'true'
        env:
          CI: true
          KEYSTORE_FILE: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: nix develop --command ./gradlew assembleRelease --no-daemon

      - name: Rename APK with Version
        if: steps.changelog.outputs.skip_release != 'true'
        run: |
          VERSION="${{ steps.changelog.outputs.new_version }}"
          for apk in app/build/outputs/apk/release/*.apk; do
            if [ -f "$apk" ]; then
              cp "$apk" "app/build/outputs/apk/release/search-${VERSION}.apk"
              break
            fi
          done

      - name: Create Release
        if: steps.changelog.outputs.skip_release != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.changelog.outputs.new_version }}
          name: ${{ steps.changelog.outputs.new_version }}
          body: ${{ steps.changelog.outputs.changelog }}
          files: app/build/outputs/apk/release/search-*.apk
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and Push Version Update to Dev
        if: steps.changelog.outputs.skip_release != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          NEW_VERSION="${{ steps.changelog.outputs.new_version }}"
          NEW_VERSION_CODE=$(grep "^appVersionCode=" gradle.properties | cut -d= -f2)

          git add gradle.properties
          git commit -m "chore: bump version to $NEW_VERSION (code $NEW_VERSION_CODE) [skip ci]"
          git push origin dev
